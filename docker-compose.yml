version: "3.9"

# Local development environment for {{SERVICE_NAME}}

services:
  app:
    build:
      context: .
      target: node-runtime   # Change to dotnet-runtime for .NET services
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      COSMOS_ENDPOINT: http://cosmos:8081
      COSMOS_KEY: C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      COSMOS_DATABASE: {{SERVICE_NAME}}-local
    volumes:
      - ./src:/app/src:ro
    depends_on:
      - cosmos
    restart: unless-stopped

  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    ports:
      - "8081:8081"
      - "10251-10255:10251-10255"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 10
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
    volumes:
      - cosmos-data:/tmp/cosmos/appdata

volumes:
  cosmos-data:
