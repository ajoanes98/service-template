          # docker tag {{SERVICE_NAME}}:${{ github.sha }} meijeracr.azurecr.io/{{SERVICE_NAME}}:${{ github.sha }}
          # docker push meijeracr.azurecr.io/{{SERVICE_NAME}}:${{ github.sha }}
          # docker tag {{SERVICE_NAME}}:${{ github.sha }} meijeracr.azurecr.io/{{SERVICE_NAME}}:latest
