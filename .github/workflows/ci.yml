name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect runtime and build
        run: |
          if [ -f "package.json" ]; then
            echo "Detected Node.js project"
            npm ci
            npm test --if-present
            npm run build --if-present
          elif [ -f "*.csproj" ] || [ -f "src/*.csproj" ]; then
            echo "Detected .NET project"
            dotnet restore
            dotnet build --no-restore
            dotnet test --no-build --verbosity normal
          else
            echo "No recognized build file found — add build steps here"
          fi

  sonarqube:
    name: SonarQube SAST Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey={{SERVICE_NAME}}
            -Dsonar.projectName={{SERVICE_NAME}}
            -Dsonar.qualitygate.wait=true

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t {{SERVICE_NAME}}:${{ github.sha }} .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "{{SERVICE_NAME}}:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push image to registry
        if: github.ref == 'refs/heads/main' && success()
        run: |
          echo "Pushing {{SERVICE_NAME}}:${{ github.sha }} to ACR..."
